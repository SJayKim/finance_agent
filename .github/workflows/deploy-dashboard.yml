name: Deploy dashboard

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-dashboard
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout CI commit
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Checkout selected commit
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master
        with:
          version: 0.4.64

      # OPENAI_API_KEY(런타임 비밀)를 GitHub 시크릿에서 Fly 시크릿으로 동기화. --stage는
      # 즉시 배포 없이 스테이징만 → 다음 flyctl deploy가 함께 적용(이중 배포 방지). GitHub
      # 시크릿에서 키를 로테이션하면 다음 배포에 자동 반영. 미설정이면 빈 값 → 챗/임팩트 비활성.
      - name: Stage OpenAI runtime secret (Fly)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_ACCESS_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl secrets set OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" --stage -a finance-agent-dashboard

      - name: Deploy dashboard
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_ACCESS_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --local-only -a finance-agent-dashboard
