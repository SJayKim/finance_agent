# Fly.io 대시보드 배포 설정. DB(Supabase)는 ap-northeast-1(도쿄)이라 같은 nrt 리전으로 지연 최소.
# 비밀(DATABASE_URL, ANTHROPIC_API_KEY)은 여기 두지 말고 `flyctl secrets set`으로 주입.
app = "finance-agent-dashboard"
primary_region = "nrt"

# LLM 게이트웨이 provider·model 스위치(플랜 11) — 비밀 아님이라 여기 둔다. 대시보드는
# impact/digest(/trigger·/run-daily)와 chat를 모두 돌리므로 세 용도 전부 openai/gpt-5.4로.
# OPENAI_API_KEY는 비밀 → `flyctl secrets set`으로 별도 주입(여기 두지 않는다).
# provider와 model은 반드시 함께 — model만 폴백되면 openai/claude-opus-4-8 → model_not_found.
[env]
  IMPACT_PROVIDER = "openai"
  IMPACT_MODEL = "gpt-5.4"
  DIGEST_PROVIDER = "openai"
  DIGEST_MODEL = "gpt-5.4"
  CHAT_PROVIDER = "openai"
  CHAT_MODEL = "gpt-5.4"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  # 유휴 시 정지해 비용 절감. 요청이 오면 자동 기동(서버 시작은 빠름 — bge-m3는 첫 누적
  # 채팅에서 lazy 로드라 콜드스타트 자체엔 영향 적음).
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

# bge-m3(~560M params, fp32)를 CPU로 로드하려면 ~2.5GB RAM 필요 → 4GB로 여유.
[[vm]]
  memory = "4gb"
  cpu_kind = "shared"
  cpus = 2
